<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculadora de carga — barra LPO</title>
    <style>
      :root {
        --bg: #0f1419;
        --surface: #1a222c;
        --text: #e8eaed;
        --muted: #9aa0a6;
        --accent: #3d9cfd;
        --accent-dim: #2a6cb0;
        --border: #2d3844;
        --focus: #7eb6ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        padding: 1rem 1.25rem 2rem;
      }

      main {
        max-width: 28rem;
        margin: 0 auto;
      }

      h1 {
        font-size: 1.35rem;
        font-weight: 700;
        margin: 0 0 0.35rem;
        letter-spacing: -0.02em;
      }

      .subtitle {
        color: var(--muted);
        font-size: 0.9rem;
        margin: 0 0 1.5rem;
      }

      fieldset {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem 1rem 0.75rem;
        margin: 0 0 1.25rem;
        background: var(--surface);
      }

      legend {
        padding: 0 0.35rem;
        font-weight: 600;
        font-size: 0.95rem;
      }

      .bar-options {
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
      }

      .bar-options label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        padding: 0.35rem 0;
      }

      .bar-options input[type="radio"] {
        width: 1.1rem;
        height: 1.1rem;
        accent-color: var(--accent);
      }

      .bar-options input:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }

      .plates-hint {
        font-size: 0.8rem;
        color: var(--muted);
        margin: -0.25rem 0 0.75rem;
      }

      .plate-row {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 0.65rem 0.75rem;
        padding: 0.5rem 0;
        border-bottom: 1px solid var(--border);
      }

      /* Miniatura estilo bumper (ilustração — não escala real entre pesos) */
      .plate-thumb {
        width: 2.7rem;
        height: 2.7rem;
        border-radius: 50%;
        flex-shrink: 0;
        position: relative;
        box-shadow:
          inset 0 2px 10px rgba(255, 255, 255, 0.18),
          inset 0 -5px 14px rgba(0, 0, 0, 0.38),
          0 2px 10px rgba(0, 0, 0, 0.5);
        border: 2px solid rgba(0, 0, 0, 0.42);
      }

      /* Centro claro (anel / insert) — contraste com a borracha */
      .plate-thumb::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 34%;
        height: 34%;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #ffffff, #f1f3f4 55%, #e8eaed);
        box-shadow:
          inset 0 1px 2px rgba(255, 255, 255, 0.95),
          inset 0 -2px 4px rgba(0, 0, 0, 0.12),
          0 0 0 1px rgba(0, 0, 0, 0.22),
          0 1px 3px rgba(0, 0, 0, 0.35);
      }

      .plate-thumb--55 {
        background: radial-gradient(circle at 32% 26%, #ff7a7a, #c62828 48%, #6d1010);
      }

      .plate-thumb--45 {
        background: radial-gradient(circle at 32% 26%, #6eb6ff, #1565c0 48%, #0a3a7a);
      }

      .plate-thumb--35 {
        background: radial-gradient(circle at 32% 26%, #ffe082, #f9a825 45%, #b06d00);
      }

      .plate-thumb--25 {
        background: radial-gradient(circle at 32% 26%, #9ccc9c, #2e7d32 48%, #145214);
      }

      /* Anilhas pretas (ferro / borracha preta) */
      .plate-thumb--black {
        background: radial-gradient(circle at 32% 26%, #5c6068, #25282e 48%, #0c0d10);
        border-color: rgba(0, 0, 0, 0.7);
        box-shadow:
          inset 0 2px 8px rgba(255, 255, 255, 0.08),
          inset 0 -5px 14px rgba(0, 0, 0, 0.55),
          0 2px 10px rgba(0, 0, 0, 0.55);
      }

      .plate-thumb--small {
        width: 2.2rem;
        height: 2.2rem;
        border-width: 1.5px;
      }

      .plate-thumb--small::after {
        width: 32%;
        height: 32%;
      }

      .plate-row:last-child {
        border-bottom: none;
      }

      /* Peso = primário (foco da tarefa); cor = secundária (reforço visual — já há a miniatura) */
      .plate-label {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0;
        min-width: 0;
      }

      .plate-kg {
        font-weight: 600;
        font-size: 1.0625rem;
        line-height: 1.35;
        letter-spacing: -0.015em;
        color: var(--text);
      }

      .plate-lb {
        font-weight: 500;
        color: var(--muted);
        font-size: 0.88em;
      }

      .plate-color {
        display: block;
        margin-top: 0.45rem;
        font-size: 0.65rem;
        line-height: 1.3;
        color: var(--muted);
        opacity: 0.82;
        letter-spacing: 0.02em;
      }

      .qty-wrap {
        display: flex;
        align-items: center;
        gap: 0.35rem;
      }

      .qty-wrap button {
        width: 2.25rem;
        height: 2.25rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
        color: var(--text);
        font-size: 1.1rem;
        line-height: 1;
        cursor: pointer;
      }

      .qty-wrap button:hover {
        border-color: var(--accent-dim);
      }

      .qty-wrap button:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }

      .qty-wrap input[type="number"] {
        width: 3rem;
        padding: 0.4rem 0.25rem;
        text-align: center;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
        color: var(--text);
        font-size: 1rem;
        -moz-appearance: textfield;
      }

      .qty-wrap input[type="number"]::-webkit-outer-spin-button,
      .qty-wrap input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      .qty-wrap input:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }

      .total-card {
        margin-top: 1.25rem;
        padding: 1.1rem 1rem;
        border-radius: 10px;
        border: 1px solid var(--accent-dim);
        background: linear-gradient(145deg, #1e2a38 0%, var(--surface) 100%);
      }

      .total-label {
        font-size: 0.85rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .total-value {
        font-size: 2rem;
        font-weight: 800;
        margin: 0.25rem 0 0;
        color: var(--accent);
      }

      .total-detail {
        font-size: 0.8rem;
        color: var(--muted);
        margin: 0.5rem 0 0;
      }

      .actions {
        margin-top: 1rem;
        display: flex;
        gap: 0.5rem;
      }

      .actions button {
        flex: 1;
        padding: 0.65rem 1rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 0.9rem;
        cursor: pointer;
      }

      .actions button:hover {
        border-color: var(--muted);
      }

      .actions button:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Calculadora de carga</h1>
      <p class="subtitle">
        Bumpers <strong>coloridos</strong> e anilhas <strong>pretas</strong>. Sempre <strong>kg</strong> primeiro e
        <strong>lb</strong> entre parênteses. Informe as anilhas de <strong>um lado</strong>; o outro é igual.
      </p>

      <form id="calc-form" autocomplete="off">
        <fieldset>
          <legend>Barra</legend>
          <div class="bar-options" role="radiogroup" aria-label="Tipo de barra">
            <label>
              <input type="radio" name="bar" value="20.412" data-lb="45" checked />
              Masculina — 20,412 kg <span class="plate-lb">(45 lb)</span>
            </label>
            <label>
              <input type="radio" name="bar" value="15.876" data-lb="35" />
              Feminina — 15,876 kg <span class="plate-lb">(35 lb)</span>
            </label>
          </div>
        </fieldset>

        <fieldset>
          <legend>Anilhas (por lado)</legend>
          <p class="plates-hint">Quantidade de cada anilha em um único lado da barra.</p>
          <div id="plates-container" aria-live="polite"></div>
        </fieldset>

        <div class="total-card">
          <div class="total-label">Soma final</div>
          <p class="total-value" id="total-display">20,412 kg (45 lb)</p>
          <p class="total-detail" id="total-detail">Barra + 2 × (soma de um lado)</p>
        </div>

        <div class="actions">
          <button type="button" id="btn-reset">Zerar anilhas</button>
        </div>
      </form>
    </main>

    <script>
      (function () {
        "use strict";

        var KG_TO_LB = 2.2046226218;

        /**
         * Ordem: do mais pesado ao mais leve (como na sua lista).
         * Coloridas: lb + kg iguais às que já estavam no app. Pretas: só kg; lb na interface = conversão.
         */
        var PLATES = [
          { id: "kg25", kg: 25, lb: null, color: "Preta", thumbCss: "plate-thumb--black" },
          { id: "lb55", kg: 24.947, lb: 55, color: "Vermelha", thumbCss: "plate-thumb--55" },
          { id: "lb45", kg: 20.412, lb: 45, color: "Azul", thumbCss: "plate-thumb--45" },
          { id: "kg20", kg: 20, lb: null, color: "Preta", thumbCss: "plate-thumb--black" },
          { id: "lb35", kg: 15.876, lb: 35, color: "Amarela", thumbCss: "plate-thumb--35" },
          { id: "kg15", kg: 15, lb: null, color: "Preta", thumbCss: "plate-thumb--black" },
          { id: "lb25", kg: 11.34, lb: 25, color: "Verde", thumbCss: "plate-thumb--25" },
          { id: "kg5", kg: 5, lb: null, color: "Preta", thumbCss: "plate-thumb--black" },
          { id: "lb10", kg: 4.536, lb: 10, color: "Preta", thumbCss: "plate-thumb--black plate-thumb--small" },
          { id: "kg2_5", kg: 2.5, lb: null, color: "Preta", thumbCss: "plate-thumb--black plate-thumb--small" },
          { id: "kg2_2", kg: 2.2, lb: null, color: "Azul", thumbCss: "plate-thumb--45 plate-thumb--small" },
          { id: "kg1_25", kg: 1.25, lb: null, color: "Preta", thumbCss: "plate-thumb--black plate-thumb--small" },
          { id: "kg1", kg: 1, lb: null, color: "Preta", thumbCss: "plate-thumb--black plate-thumb--small" },
        ];

        var container = document.getElementById("plates-container");
        var totalDisplay = document.getElementById("total-display");
        var totalDetail = document.getElementById("total-detail");
        var form = document.getElementById("calc-form");
        var btnReset = document.getElementById("btn-reset");

        function formatKgExact(n) {
          var s = n.toFixed(3);
          s = s.replace(/\.?0+$/, "");
          s = s.replace(/\./g, ",");
          return s;
        }

        function formatLbFromKg(kg) {
          var lb = kg * KG_TO_LB;
          var r = Math.round(lb);
          if (Math.abs(lb - r) < 0.06) {
            return String(r);
          }
          return lb.toFixed(1).replace(/\.0$/, "");
        }

        function formatLbTotal(lb) {
          if (Math.abs(lb - Math.round(lb)) < 0.05) {
            return String(Math.round(lb));
          }
          var x = Math.round(lb * 10) / 10;
          return String(x.toFixed(1)).replace(/\.0$/, "");
        }

        function kgLbLabel(kg, lb) {
          return formatKgExact(kg) + " kg (" + formatLbTotal(lb) + " lb)";
        }

        function plateLineLabel(p) {
          if (p.lb != null) {
            return formatKgExact(p.kg) + " kg (" + String(p.lb) + " lb)";
          }
          return formatKgExact(p.kg) + " kg (" + formatLbFromKg(p.kg) + " lb)";
        }

        function plateThumbTitle(p) {
          return plateLineLabel(p) + " — " + p.color;
        }

        function buildPlateRows() {
          PLATES.forEach(function (p) {
            var id = "plate-" + p.id;
            var row = document.createElement("div");
            row.className = "plate-row";

            var thumb = document.createElement("div");
            thumb.className = "plate-thumb " + p.thumbCss;
            thumb.setAttribute("aria-hidden", "true");
            thumb.title = plateThumbTitle(p);

            var labelWrap = document.createElement("div");
            labelWrap.className = "plate-label";
            var label = document.createElement("label");
            label.setAttribute("for", id);
            var kgSpan = document.createElement("span");
            kgSpan.className = "plate-kg";
            kgSpan.textContent = plateLineLabel(p);
            var colorSpan = document.createElement("span");
            colorSpan.className = "plate-color";
            colorSpan.textContent = p.color;
            label.appendChild(kgSpan);
            label.appendChild(colorSpan);
            labelWrap.appendChild(label);

            var qtyWrap = document.createElement("div");
            qtyWrap.className = "qty-wrap";

            var minus = document.createElement("button");
            minus.type = "button";
            minus.setAttribute("aria-label", "Diminuir " + plateLineLabel(p));
            minus.textContent = "−";

            var input = document.createElement("input");
            input.type = "number";
            input.id = id;
            input.name = "plate-" + id;
            input.min = "0";
            input.step = "1";
            input.value = "0";
            input.setAttribute("inputmode", "numeric");
            input.setAttribute("aria-label", "Quantidade " + plateLineLabel(p));

            var plus = document.createElement("button");
            plus.type = "button";
            plus.setAttribute("aria-label", "Aumentar " + plateLineLabel(p));
            plus.textContent = "+";

            minus.addEventListener("click", function () {
              var v = parseInt(input.value, 10) || 0;
              input.value = String(Math.max(0, v - 1));
              input.dispatchEvent(new Event("input", { bubbles: true }));
            });
            plus.addEventListener("click", function () {
              var v = parseInt(input.value, 10) || 0;
              input.value = String(v + 1);
              input.dispatchEvent(new Event("input", { bubbles: true }));
            });

            qtyWrap.appendChild(minus);
            qtyWrap.appendChild(input);
            qtyWrap.appendChild(plus);

            row.appendChild(thumb);
            row.appendChild(labelWrap);
            row.appendChild(qtyWrap);
            container.appendChild(row);
          });
        }

        function getBarWeightKg() {
          var checked = form.querySelector('input[name="bar"]:checked');
          return checked ? parseFloat(checked.value) : 20.412;
        }

        function getBarWeightLb() {
          var checked = form.querySelector('input[name="bar"]:checked');
          if (!checked) {
            return 45;
          }
          var lb = checked.getAttribute("data-lb");
          return lb ? parseInt(lb, 10) : 45;
        }

        function getSideTotals() {
          var inputs = container.querySelectorAll('input[type="number"]');
          var sumKg = 0;
          var sumLb = 0;
          inputs.forEach(function (inp, i) {
            var qty = parseInt(inp.value, 10);
            if (isNaN(qty) || qty < 0) {
              qty = 0;
            }
            var plate = PLATES[i];
            sumKg += plate.kg * qty;
            sumLb += (plate.lb != null ? plate.lb : plate.kg * KG_TO_LB) * qty;
          });
          return { kg: sumKg, lb: sumLb };
        }

        function clampInputs() {
          var inputs = container.querySelectorAll('input[type="number"]');
          inputs.forEach(function (inp) {
            var v = parseInt(inp.value, 10);
            if (isNaN(v) || v < 0) {
              inp.value = "0";
            }
          });
        }

        function updateTotal() {
          clampInputs();
          var barKg = getBarWeightKg();
          var barLb = getBarWeightLb();
          var side = getSideTotals();
          var totalKg = barKg + 2 * side.kg;
          var totalLb = barLb + 2 * side.lb;
          var somaFinalText =
            formatKgExact(totalKg) + " kg (" + formatLbTotal(totalLb) + " lb)";
          totalDisplay.textContent = somaFinalText;
          totalDetail.textContent =
            "Barra " +
            kgLbLabel(barKg, barLb) +
            " + 2 × " +
            kgLbLabel(side.kg, side.lb) +
            " (um lado) = " +
            somaFinalText;
        }

        buildPlateRows();

        form.addEventListener("input", updateTotal);
        form.addEventListener("change", updateTotal);

        btnReset.addEventListener("click", function () {
          container.querySelectorAll('input[type="number"]').forEach(function (inp) {
            inp.value = "0";
          });
          updateTotal();
        });

        updateTotal();
      })();
    </script>
  </body>
</html>
